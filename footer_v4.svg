<svg width="900" height="210" viewBox="0 0 900 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="f4-title">
  <title id="f4-title">HALUZ Footer — System Telemetry v4</title>
  <defs>
    <style>
      .f-title { font-family: Arial,'Helvetica Neue',sans-serif; font-weight:900; letter-spacing:1.5px; }
      .f-mono  { font-family:'Courier New',Courier,monospace; font-weight:bold; }
      .f-data  { font-family:'Courier New',Courier,monospace; font-size:9px; }
      .f-term  { font-family:'Courier New',Courier,monospace; font-size:10px; }

      @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
      @keyframes blink     { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.35} }
      @keyframes dataScan  { 0%,100%{opacity:.5} 50%{opacity:1} }
      @keyframes sparkline { 0%{stroke-dashoffset:300} 100%{stroke-dashoffset:0} }
      @keyframes netFlow   { 0%{stroke-dashoffset:200} 100%{stroke-dashoffset:0} }
      @keyframes borderPulse{ 0%,100%{stroke-opacity:1} 50%{stroke-opacity:.3} }
      @keyframes textFlicker{ 0%,100%{opacity:1} 2%{opacity:.8} 4%{opacity:1} 95%{opacity:.5} 97%{opacity:1} }
      @keyframes cornerFlash{ 0%,90%,100%{opacity:1} 95%{opacity:.3} }

      /* typewriter: lines appear one by one on a 7s loop */
      @keyframes tw1 { 0%,4%{opacity:0}   5%,100%{opacity:1} }
      @keyframes tw2 { 0%,18%{opacity:0}  19%,100%{opacity:1} }
      @keyframes tw3 { 0%,32%{opacity:0}  33%,100%{opacity:1} }
      @keyframes tw4 { 0%,46%{opacity:0}  47%,100%{opacity:1} }
      @keyframes tw5 { 0%,60%{opacity:0}  61%,100%{opacity:1} }
      @keyframes tw6 { 0%,74%{opacity:0}  75%,100%{opacity:1} }

      .boot-1{animation:fadeIn .4s ease-out .15s forwards;opacity:0}
      .boot-2{animation:fadeIn .4s ease-out .35s forwards;opacity:0}
      .boot-3{animation:fadeIn .4s ease-out .55s forwards;opacity:0}
      .boot-4{animation:fadeIn .4s ease-out .75s forwards;opacity:0}

      .anim-blink   {animation:blink       1s steps(1) infinite}
      .anim-pulse   {animation:pulse       2s ease-in-out infinite}
      .data-scan    {animation:dataScan    1.5s ease-in-out infinite}
      .border-pulse {animation:borderPulse 2s ease-in-out infinite}
      .text-flicker {animation:textFlicker 8s ease-in-out infinite}
      .corner-flash {animation:cornerFlash 5s ease-in-out infinite}
      .anim-spark   {animation:sparkline   3s linear infinite; stroke-dasharray:300}
      .anim-net     {animation:netFlow     4s linear infinite; stroke-dasharray:200}

      .tw-1{animation:tw1 7s steps(1) infinite}
      .tw-2{animation:tw2 7s steps(1) infinite}
      .tw-3{animation:tw3 7s steps(1) infinite}
      .tw-4{animation:tw4 7s steps(1) infinite}
      .tw-5{animation:tw5 7s steps(1) infinite}
      .tw-6{animation:tw6 7s steps(1) infinite}
    </style>

    <pattern id="fgrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0L0 0 0 20" fill="none" stroke="#0d0d0d" stroke-width=".5"/>
    </pattern>
    <filter id="glow-xs">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="210" fill="#050505"/>
  <rect width="900" height="210" fill="url(#fgrid)"/>
  <rect x="0" y="0" width="900" height="2" fill="#ff003c" opacity=".4"/>

  <!-- Corner brackets -->
  <path d="M0 210 L26 210 L26 205 L5 205 L5 184 L0 184Z"  fill="#ff003c" class="boot-1 corner-flash"/>
  <path d="M900 210 L874 210 L874 205 L895 205 L895 184 L900 184Z" fill="#00f3ff" class="boot-1 corner-flash"/>

  <!-- ═══════════════════════════════════════════════════════════════
       PANEL 1: NETWORK TRAFFIC (sparklines)
       ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(14,10)" class="boot-2">
    <rect width="230" height="115" fill="#07070f" stroke="#00f3ff" stroke-width=".6" rx="2"/>
    <text x="10" y="17" class="f-title data-scan" font-size="9" fill="#00f3ff">&gt;&gt; NETWORK_TRAFFIC</text>

    <!-- INBOUND -->
    <text x="10" y="32" class="f-data" fill="#778899">INBOUND [Kb/s]</text>
    <rect x="10" y="35" width="210" height="28" fill="#0a1a1a" stroke="#111" rx="1"/>
    <polyline
      points="12,58 22,52 32,55 42,44 52,48 62,38 72,46 82,40 92,50 102,36 112,43 122,48 132,34 142,46 152,40 162,53 172,38 182,48 192,35 202,46 212,41 218,50"
      fill="none" stroke="#0aff0a" stroke-width="1.4" class="anim-spark" filter="url(#glow-xs)"/>
    <text x="188" y="32" class="f-mono" font-size="10" fill="#0aff0a">847.2</text>

    <!-- OUTBOUND -->
    <text x="10" y="75" class="f-data" fill="#778899">OUTBOUND [Kb/s]</text>
    <rect x="10" y="78" width="210" height="22" fill="#0a0a1a" stroke="#111" rx="1"/>
    <polyline
      points="12,96 22,90 32,92 42,87 52,90 62,83 72,88 82,85 92,92 102,80 112,86 122,90 132,78 142,88 152,83 162,94 172,80 182,90 192,78 202,88 212,84 218,88"
      fill="none" stroke="#ff003c" stroke-width="1.4" class="anim-net" filter="url(#glow-xs)"/>
    <text x="188" y="75" class="f-mono" font-size="10" fill="#ff003c">234.8</text>

    <text x="10" y="110" class="f-data" fill="#445566">SOCKET:ACTIVE | BUFFER:42% | PING:12ms</text>
    <circle cx="220" cy="106" r="3.5" fill="#0aff0a" class="anim-pulse"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════
       PANEL 2: RECENT COMMITS (typewriter)
       ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(258,10)" class="boot-2">
    <path d="M0 0 L320 0 L320 115 L10 115 L0 105Z"
          fill="#07070f" stroke="#333" stroke-width=".6" rx="1"/>
    <!-- Terminal title bar -->
    <rect x="3" y="3" width="90" height="3" fill="#00f3ff" opacity=".6"/>
    <text x="10" y="16" class="f-data" fill="#00f3ff">/var/log/haluz-git.log</text>

    <g transform="translate(10,28)" class="f-term">
      <text x="0" y="0"  fill="#778899" class="tw-1">&gt; git log --oneline --graph</text>
      <text x="0" y="14" fill="#0aff0a" class="tw-2">* {{COMMIT_1}}</text>
      <text x="0" y="28" fill="#0aff0a" class="tw-3">* {{COMMIT_2}}</text>
      <text x="0" y="42" fill="#ff9500" class="tw-4">* {{COMMIT_3}}</text>
      <text x="0" y="56" fill="#0aff0a" class="tw-5">* {{COMMIT_4}}</text>
      <text x="0" y="70" fill="#0aff0a" class="tw-6">* {{COMMIT_5}}</text>
      <text x="0" y="84" fill="#fff" class="tw-6">&#9608;<tspan class="anim-blink">_</tspan></text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════
       PANEL 3: SYSTEM LOG
       ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(592,10)" class="boot-3">
    <path d="M0 0 L290 0 L290 115 L10 115 L0 105Z"
          fill="#07070f" stroke="#333" stroke-width=".6" rx="1"/>
    <rect x="3" y="3" width="90" height="3" fill="#bf00ff" opacity=".6"/>
    <text x="10" y="16" class="f-data" fill="#bf00ff">/var/log/haluz.log</text>

    <g transform="translate(10,30)" class="f-term">
      <text x="0" y="0"  fill="#fff"    class="tw-1">&gt; HALUZ_PROTOCOL v5.0 init</text>
      <text x="0" y="14" fill="#0aff0a" class="tw-2">&gt; [OK] GitHub API [23ms]</text>
      <text x="0" y="28" fill="#0aff0a" class="tw-3">&gt; [OK] Neural Stack [128MB]</text>
      <text x="0" y="42" fill="#0aff0a" class="tw-4">&gt; [OK] SVG Templates Ready</text>
      <text x="0" y="56" fill="#ff9500" class="tw-5">&gt; [WARN] Bambu P1S OFFLINE</text>
      <text x="0" y="70" fill="#fff"    class="tw-6">&gt; Ready for input... <tspan class="anim-blink">_</tspan></text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════
       BOTTOM STATUS BAR
       ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(14,135)" class="boot-4">
    <rect width="872" height="38" fill="#060606" stroke="#1a1a1a" rx="1"/>

    <!-- Current task -->
    <g transform="translate(8,5)">
      <rect width="175" height="28" fill="#07070f" stroke="#00f3ff" stroke-width=".5" rx="1"/>
      <text x="8"  y="12" class="f-data data-scan" fill="#00f3ff">CURRENT_TASK</text>
      <text x="8"  y="26" class="f-mono" font-size="11" fill="#fff">FULL STACK DEV</text>
    </g>

    <!-- Session / system -->
    <g transform="translate(196,5)">
      <rect width="285" height="28" fill="#07070f" stroke="#333" stroke-width=".5" rx="1"/>
      <text x="8"  y="12" class="f-data text-flicker" fill="#445566">SESSION: #4A7F2B3C</text>
      <text x="8"  y="24" class="f-data" fill="#445566">PROC:847 | MEM:64% | CPU:23% | TEMP:42°C</text>
    </g>

    <!-- Execute -->
    <g transform="translate(494,5)">
      <rect width="110" height="28" fill="#150505" stroke="#ff003c" stroke-width=".9" rx="1"/>
      <text x="55" y="20" text-anchor="middle" class="f-title" font-size="13" fill="#ff003c">EXECUTE</text>
    </g>

    <!-- Clock -->
    <g transform="translate(618,5)">
      <rect width="118" height="28" fill="#07070f" stroke="#333" stroke-width=".5" rx="1"/>
      <text x="8" y="12" class="f-data" fill="#445566">SYS_TIME</text>
      <text x="8" y="25" class="f-mono" font-size="11" fill="#00f3ff">CST 06:11:38</text>
    </g>

    <!-- Online -->
    <g transform="translate(750,5)">
      <rect width="112" height="28" fill="#051505" stroke="#0aff0a" stroke-width=".5" rx="1"/>
      <circle cx="14" cy="14" r="5" fill="#0aff0a" class="anim-pulse"/>
      <text x="24" y="18" class="f-mono" font-size="10" fill="#0aff0a">ONLINE</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════
       FOOTER INFO LINE
       ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(14,178)" class="boot-4">
    <text class="f-data text-flicker" fill="#334455" font-size="8">
      0xF3A7 &gt;&gt; [PACKET:OK] [CHECKSUM:VALID] [AES256] [HTTPS/2] [CERT:VALID] [HANDSHAKE:OK]
    </text>
  </g>

  <g transform="translate(14,194)">
    <line x1="0" y1="0" x2="872" y2="0" stroke="#1a1a1a" stroke-width=".5"/>
    <text x="4"   y="14" class="f-mono text-flicker" font-size="9" fill="#334455">2026 NIGHT CITY NETWORKS // HALUZ PROTOCOL</text>
    <text x="388" y="14" class="f-data data-scan"   fill="#00f3ff">github.com/aaronestradabonilla777</text>
    <text x="620" y="14" class="f-data text-flicker" fill="#334455">BUILD: 2026.03.30 | REV: v4.0</text>
    <circle cx="858" cy="10" r="4" fill="#0aff0a" class="anim-pulse"/>
    <text x="840" y="6" class="f-data" fill="#334455" font-size="7">SYS</text>
  </g>

  <!-- Decorative corner lines -->
  <rect x="14"  y="206" width="45" height="2" fill="#ff003c" opacity=".4"/>
  <rect x="841" y="206" width="45" height="2" fill="#00f3ff" opacity=".4"/>

  <text x="886" y="206" text-anchor="end" class="f-data text-flicker" fill="#334455">HALUZ_FOOTER_v4.0</text>
</svg>
